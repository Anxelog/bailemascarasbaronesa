name.Spanish=El baile de máscaras de la Baronesa 
name.English=The Baroness's Masquerade Ball
synopsys.Spanish=La policía se pregunta qué ocurre en los bailes de máscaras de la Baronesa Hilda. ¿Podrás ayudarles?
synopsys.English=The police are wondering what truly happens during Baroness Hilda’s masquerade balls. Will you be able to help them uncover the truth?
description.Spanish=Esta noche la Baronesa Hilda organiza su baile de máscaras anual. Es el evento social más importante de Arkham y ya nadie recuerda a cuándo se remontan sus inicios, pues se trata de una tradición iniciada por los ancestros de la Baronesa.\n\nLa policía sospecha que el evento puede ser una tapadera para algún tipo de crimen perpetrado por un grupo de personas de la alta sociedad, pero carecen de indicios suficientes como para intervenir y os piden ayuda.\n\n---\n1.1v\n<i>Se ha hecho un esfuerzo por añadir sonidos que ayuden a la inmersión en la aventura, por lo que se recomienda que la opción de Efectos (Menú principal / Opciones / Efectos) esté activa y con nivel de volumen aceptable.\n\nSe ha querido primar la brevedad descargando, en consecuencia, la línea argumental y el número de interacciones. Con todo, en el escenario creo que encontraréis elementos que lo hacen inmersivo y entretenido para una partida relativamente breve (60-90 min) y ligera.\n\nLas imágenes utilizadas para esta aventura proceden de Pixabay (http://pixabay.com) y los audios de Freesound (http://freesound.org). Agradezco enormemente la generosidad y talento de sus respectivos autores y autoras.</i>
description.English=Tonight, Baroness Hilda is hosting her annual masquerade ball. This is the most important social event in Arkham, and no one quite remembers when the tradition began. It has been passed down through the Baroness’s ancestors since time immemorial. \n\n The police suspect that the ball may serve as a cover for something far more sinister — perhaps a crime orchestrated by members of Arkham’s high society. Lacking sufficient evidence to act openly, they have asked for your help. \n\n --- \n\n Immersion Note <i>An effort has been made to include sounds that enhance the atmosphere of the adventure. It is recommended that the Effects option (Main Menu → Options → Effects) is active and set to a suitable volume. \n\n Brevity has been prioritized, reducing the length of the story and the number of interactions. Even so, the scenario still contains many immersive and entertaining elements in a relatively short, light game (60–90 minutes). \n\n TThe images used in this adventure come from Pixabay (http://pixabay.com) and the audio from Freesound (http://freesound.org). We are deeply grateful for the generosity and talent of their creators.</i>
